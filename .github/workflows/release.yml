name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-release:
    name: Build release artifact
    runs-on: ubuntu-latest
    container:
      image: ubuntu:latest

    steps:
      - name: Install git
        run: |
          export DEBIAN_FRONTEND=noninteractive
          apt-get update
          apt-get install -y git

      - name: Checkout
        uses: actions/checkout@v4

      - name: Install ldc2 + dub
        run: |
          export DEBIAN_FRONTEND=noninteractive
          apt-get update
          apt-get install -y ldc dub zip

      - name: Build release binary
        run: |
          chmod +x ./build.sh
          ./build.sh build

      - name: Verify binary
        run: |
          ./cx --version

      - name: Run test suite before packaging
        run: |
          command -v rdmd
          mkdir -p "$HOME/.local/bin"
          cp ./cx "$HOME/.local/bin/cx"
          chmod +x "$HOME/.local/bin/cx"
          export PATH="$HOME/.local/bin:$PATH"
          mkdir -p "$HOME/.cx"
          cp -r ./std "$HOME/.cx/std"
          rdmd tests/unit.d

      - name: Assemble release folder
        env:
          TAG: ${{ github.ref_name }}
        run: |
          RELEASE_DIR="cx-${TAG}"
          mkdir -p "$RELEASE_DIR"

          # Copy the whole repo (as if from git clone), excluding .git and CI-only junk
          git archive --format=tar HEAD | tar -x -C "$RELEASE_DIR"

          # Overwrite/ensure the freshly built binary is present and executable
          cp ./cx "$RELEASE_DIR/cx"
          chmod +x "$RELEASE_DIR/cx"

          zip -r "${RELEASE_DIR}.zip" "$RELEASE_DIR"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: cx-release-zip
          path: cx-*.zip

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: cx-*.zip
          generate_release_notes: true
