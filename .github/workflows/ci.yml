name: CI

on:
  push:
    branches: [ main, dev ]
  pull_request:
    branches: [ main, dev ]
  workflow_dispatch:

jobs:
  test:
    name: build + test (${{ matrix.distro }})
    runs-on: ubuntu-latest
    container:
      image: ${{ matrix.image }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - distro: fedora
            image: fedora:latest
          - distro: ubuntu
            image: ubuntu:latest
          - distro: arch
            image: archlinux:latest

    steps:
      - name: Install git (needed before checkout on bare containers)
        run: |
          if command -v dnf >/dev/null 2>&1; then
            dnf install -y git which
          elif command -v apt-get >/dev/null 2>&1; then
            export DEBIAN_FRONTEND=noninteractive
            apt-get update
            apt-get install -y git which
          elif command -v pacman >/dev/null 2>&1; then
            pacman -Sy --noconfirm git which
          fi

      - name: Checkout
        uses: actions/checkout@v4

      - name: Install ldc2, dub (Fedora)
        if: matrix.distro == 'fedora'
        run: dnf install -y ldc dub

      - name: Install llvm-devel (Fedora)
        if: matrix.distro == 'fedora'
        run: dnf install -y llvm-devel

      # Ubuntu não precisa mais bater com uma versão exata do LLVM: o
      # tests/unit.d agora detecta a versão instalada em runtime via
      # `llvm-config --version`. Basta ter *alguma* versão -dev instalada.
      - name: Install ldc2, dub, gcc, llvm-dev (Ubuntu)
        if: matrix.distro == 'ubuntu'
        run: |
          export DEBIAN_FRONTEND=noninteractive
          apt-get update
          apt-get install -y ldc dub gcc llvm-21-dev

      - name: Install ldc2, dub, llvm (Arch)
        if: matrix.distro == 'arch'
        run: pacman -Sy --noconfirm ldc dub llvm

      - name: Verify dependencies
        run: |
          command -v ldc2
          command -v dub
          ldc2 --version
          dub --version

      - name: Ensure llvm-c headers are on the default system include path
        run: |
          if [ -f /usr/include/llvm-c/Core.h ]; then
            echo "llvm-c/Core.h already on default include path"
            exit 0
          fi
          FOUND_DIR=$(find / -type d -name "llvm-c" -path "*include*" 2>/dev/null | head -n 1)
          if [ -z "$FOUND_DIR" ]; then
            echo "llvm-c headers not found anywhere on this system"
            exit 1
          fi
          echo "Found llvm-c headers at: $FOUND_DIR"
          ln -s "$FOUND_DIR" /usr/include/llvm-c
          test -f /usr/include/llvm-c/Core.h

      - name: Ensure llvm-config is on PATH
        run: |
          if command -v llvm-config >/dev/null 2>&1; then
            echo "llvm-config already on PATH: $(command -v llvm-config)"
            exit 0
          fi
          FOUND=$(find / -type f -name "llvm-config*" 2>/dev/null | grep -v '\.so' | head -n 1)
          if [ -z "$FOUND" ]; then
            echo "llvm-config not found; tests/unit.d will fall back to no -L flag"
            exit 0
          fi
          echo "Found llvm-config at: $FOUND"
          ln -s "$FOUND" /usr/local/bin/llvm-config
          llvm-config --version

      - name: Build + install cx (./build.sh)
        run: |
          chmod +x ./build.sh
          ./build.sh

      - name: Add ~/.local/bin to PATH
        run: echo "$HOME/.local/bin" >> "$GITHUB_PATH"

      - name: Verify cx is installed and on PATH
        run: |
          which cx
          cx --version

      - name: Compile test suite with ldc2
        run: ldc2 tests/unit.d -of=tests/unit_test

      - name: Run test suite
        run: ./tests/unit_test

      - name: Clean up test artifacts
        run: rm -f ./tests/unit_test ./tests/unit_test.o ./unit_test.o
